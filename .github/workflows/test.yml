name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    # Docs-only pushes skip the redundant run (build.yml skips them too).
    # PR trigger stays unfiltered so PR checks always report.
    paths-ignore:
      - "**.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
